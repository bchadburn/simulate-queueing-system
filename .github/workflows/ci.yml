name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.9"
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run pytest tests/ -q --no-cov
